openapi: 3.0.0
info:
  title: Todo API
  description: |
    REST API for Todo App with gamification features.
    
    ## Features
    - User authentication (JWT-based)
    - Todo CRUD operations with optimistic locking
    - User connections for shared todos
    - Gamification system (XP, levels, badges)
    - Real-time synchronization
    
    ## Performance Targets
    - API Response Time: < 200ms (p95)
    - Authentication: < 100ms (p95)
  version: 1.0.0
  contact:
    name: API Support
    email: api@todoapp.com

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.todoapp.com
    description: Production server

tags:
  - name: Authentication
    description: User registration and login
  - name: Users
    description: User profile management
  - name: Todos
    description: Todo CRUD operations
  - name: Connections
    description: User connection management
  - name: Gamification
    description: XP, levels, and badges
  - name: Health
    description: Health check endpoints

paths:
  /health/live:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Returns 200 if the service is running
      operationId: livenessProbe
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: alive

  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Returns 200 if the service is ready to accept traffic
      operationId: readinessProbe
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  checks:
                    type: object
                    properties:
                      database:
                        type: string
                      redis:
                        type: string

  /api/v1/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: Login a user
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
                - refresh_token
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_at:
                    type: string
                    format: date-time

  /api/v1/auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      operationId: logoutUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
              required:
                - refresh_token
      responses:
        '200':
          description: Logout successful

  /api/v1/users/me:
    get:
      tags:
        - Users
      summary: Get current user profile
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'

    put:
      tags:
        - Users
      summary: Update current user profile
      operationId: updateCurrentUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                  minLength: 2
                  maxLength: 50
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'

  /api/v1/todos:
    get:
      tags:
        - Todos
      summary: List todos
      operationId: listTodos
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, completed]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, urgent]
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: List of todos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodoListResponse'

    post:
      tags:
        - Todos
      summary: Create a new todo
      operationId: createTodo
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTodoRequest'
      responses:
        '201':
          description: Todo created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  todo:
                    $ref: '#/components/schemas/Todo'

  /api/v1/todos/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      tags:
        - Todos
      summary: Get a todo by ID
      operationId: getTodo
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Todo retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  todo:
                    $ref: '#/components/schemas/Todo'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Todos
      summary: Update a todo
      operationId: updateTodo
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTodoRequest'
      responses:
        '200':
          description: Todo updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  todo:
                    $ref: '#/components/schemas/Todo'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    delete:
      tags:
        - Todos
      summary: Delete a todo
      operationId: deleteTodo
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Todo deleted successfully

  /api/v1/todos/{id}/complete:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    post:
      tags:
        - Todos
      summary: Mark a todo as complete
      operationId: completeTodo
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version:
                  type: integer
              required:
                - version
      responses:
        '200':
          description: Todo marked as complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  todo:
                    $ref: '#/components/schemas/Todo'

  /api/v1/connections:
    get:
      tags:
        - Connections
      summary: List user connections
      operationId: listConnections
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Connection'

  /api/v1/connections/invite:
    post:
      tags:
        - Connections
      summary: Create connection invitation
      operationId: createInvitation
      security:
        - BearerAuth: []
      responses:
        '201':
          description: Invitation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationResponse'

  /api/v1/connections/invite/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string

    get:
      tags:
        - Connections
      summary: Validate invitation token
      operationId: validateInvitation
      responses:
        '200':
          description: Invitation is valid

    post:
      tags:
        - Connections
      summary: Accept invitation
      operationId: acceptInvitation
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Invitation accepted

  /api/v1/users/me/stats:
    get:
      tags:
        - Gamification
      summary: Get user gamification stats
      operationId: getUserStats
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User stats retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserStats'

  /api/v1/users/me/history:
    get:
      tags:
        - Gamification
      summary: Get points history
      operationId: getPointsHistory
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: Points history retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/PointsTransaction'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        created_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string
          minLength: 2
          maxLength: 50
      required:
        - email
        - password
        - display_name

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        access_token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time

    Todo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        status:
          type: string
          enum: [pending, in_progress, completed]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        created_by:
          type: string
          format: uuid
        assigned_to:
          type: string
          format: uuid
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTodoRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        priority:
          type: string
          enum: [low, medium, high, urgent]
        assigned_to:
          type: string
          format: uuid
      required:
        - title

    UpdateTodoRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 2000
        status:
          type: string
          enum: [pending, in_progress, completed]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        assigned_to:
          type: string
          format: uuid
        version:
          type: integer
      required:
        - version

    TodoListResponse:
      type: object
      properties:
        todos:
          type: array
          items:
            $ref: '#/components/schemas/Todo'
        total_count:
          type: integer
        page:
          type: integer
        page_size:
          type: integer

    Connection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_a_id:
          type: string
          format: uuid
        user_b_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, accepted, rejected]
        created_at:
          type: string
          format: date-time

    InvitationResponse:
      type: object
      properties:
        connection_id:
          type: string
          format: uuid
        token:
          type: string
        invitation_link:
          type: string
        expires_at:
          type: string
          format: date-time

    UserStats:
      type: object
      properties:
        points:
          type: integer
        level:
          type: integer
        level_name:
          type: string
        streak:
          type: integer
        total_todos_completed:
          type: integer
        progress_to_next_level:
          type: number
        xp_for_next_level:
          type: integer

    PointsTransaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        points:
          type: integer
        reason:
          type: string
        created_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
